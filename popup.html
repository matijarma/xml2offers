<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izrada ponuda</title>
    <link rel="stylesheet" href="./lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --primary: #c10034;
            --primary-hover: #a3002d;
            --bg: #f2f4f8;
            --surface: #ffffff;
            --text: #1f2a37;
            --text-light: #5f6c7b;
            --border: #d8dee6;
            --success: #1a9a68;
            --hover: #edf1f6;

            /* Status */
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --danger-fg: #ffffff;
            --warn: #d97706;
            --warn-hover: #b45309;
            --info: var(--primary);

            /* Spacing - 4px base */
            --space-0: 0;
            --space-1: 2px;
            --space-2: 4px;
            --space-3: 6px;
            --space-4: 8px;
            --space-5: 10px;
            --space-6: 12px;
            --space-7: 16px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;

            /* Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-pill: 999px;

            /* Shadows + scrim */
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 10px 24px rgba(15, 23, 42, 0.12);
            --shadow-overlay: 0 24px 60px rgba(15, 23, 42, 0.32);
            --scrim: rgba(15, 23, 42, 0.35);

            /* Typography */
            --fs-label: 11px;
            --fs-body: 12px;
            --fs-value: 12px;
            --fs-title: 13px;
            --fs-h: 15px;
            --fw-regular: 500;
            --fw-strong: 600;
            --fw-bold: 700;

            /* Motion */
            --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);
            --ease-out-strong: cubic-bezier(0.16, 1, 0.3, 1);
            --dur-fast: 120ms;
            --dur-base: 220ms;
            --dur-slow: 320ms;
        }

        :root[data-theme="dark"] {
            --primary: #e11d48;
            --primary-hover: #f0758e;
            --bg: #131a22;
            --surface: #1b2530;
            --text: #eef1f5;
            --text-light: #b8c2cf;
            --border: #2b3a4b;
            --hover: #223141;
            --success: #2fb07a;

            --danger: #f87171;
            --danger-hover: #ef4444;
            --danger-fg: #1a0a0c;
            --warn: #fbbf24;
            --warn-hover: #f59e0b;

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.35);
            --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.45);
            --shadow-overlay: 0 28px 70px rgba(0, 0, 0, 0.6);
            --scrim: rgba(0, 0, 0, 0.55);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-width: 460px;
            width: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 12px;
            transition: background 0.3s, color 0.3s;
        }


        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 6px;
        }

        .settings-btn {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border 0.2s;
        }
        .settings-btn:hover {
            background: var(--hover);
            border-color: var(--primary);
            color: var(--text);
        }
        .settings-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .brand-logo { width: 32px; height: 32px; border-radius: 8px; }
        .header-content { min-width: 0; }
        .header-content h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }
        .subtitle { font-size: 12px; color: var(--text-light); margin-top: 2px; line-height: 1.35; }

        .privacy-note {
            font-size: 12px;
            color: var(--text-light);
            margin: 0 0 12px 0;
            line-height: 1.4;
        }

        .main-content-shell {
            transition: opacity 0.22s ease, transform 0.22s ease, max-height 0.24s ease;
            max-height: 4000px;
            opacity: 1;
            transform: translateY(0);
            overflow: hidden;
        }

        body.settings-open .main-content-shell {
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            max-height: 0;
        }

        .setting-group-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.55px;
            margin: 18px 0 8px 0;
        }
        .setting-group-title:first-child { margin-top: 2px; }

        .setting-group-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin: 18px 0 8px 0;
        }

        .setting-group-head .setting-group-title {
            margin: 0;
        }

        .setting-group-note {
            font-size: 11px;
            color: var(--text-light);
            text-align: right;
            line-height: 1.35;
        }

        .settings-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transform: translateY(-8px);
            transition: max-height 0.25s ease, opacity 0.25s ease, transform 0.25s ease, padding 0.25s ease;
            padding: 0 14px;
            margin-bottom: 0;
            pointer-events: none;
        }
        .settings-panel.open {
            max-height: calc(100vh - 132px);
            opacity: 1;
            transform: translateY(0);
            padding: 2px 0 10px;
            margin-bottom: 0;
            pointer-events: auto;
            overflow-y: auto;
            background: transparent;
            border: none;
            border-radius: 0;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .setting-item:last-child { border-bottom: none; }

        .setting-label {
            font-size: 12px;
            font-weight: 600;
        }

        .toggle-pill {
            border: 1px solid var(--border);
            background: var(--hover);
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 11px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s, border 0.2s, color 0.2s;
            min-width: 108px;
            width: auto;
            text-align: center;
        }
        .toggle-pill:hover { border-color: var(--primary); }
        .toggle-pill:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .setting-stack {
            flex-direction: column;
            align-items: stretch;
        }

        .setting-plain {
            border-bottom: none;
            padding-top: 2px;
        }

        .setting-column {
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
        }

        .setting-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }

        .setting-value {
            font-size: 11px;
            color: var(--text-light);
        }

        .text-input,
        .textarea-input,
        .number-input,
        .date-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 7px;
            background: var(--surface);
            color: var(--text);
            padding: 7px 9px;
            font-size: 12px;
            font-family: inherit;
        }

        .text-input:focus,
        .textarea-input:focus,
        .number-input:focus,
        .date-input:focus {
            outline: 2px solid var(--primary);
            outline-offset: 1px;
            border-color: var(--primary);
        }

        .textarea-input {
            resize: vertical;
            min-height: 52px;
            max-height: 120px;
        }

        .range-input {
            width: 100%;
            accent-color: var(--primary);
        }

        .color-input {
            width: 44px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            padding: 0;
            width: 112px;
        }

        .logo-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-preview {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .logo-preview.hidden { display: none; }

        .ghost-btn {
            border: none;
            background: none;
            color: var(--text-light);
            font-size: 11px;
            cursor: pointer;
        }
        .ghost-btn:hover { color: var(--text); }

        #upload-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #upload-zone:hover, #upload-zone.dragover {
            border-color: var(--primary);
            background-color: var(--bg); /* slight contrast */
        }

        .icon-upload { font-size: 36px; color: var(--text-light); }
        .upload-text { font-size: 13px; font-weight: 600; }
        .upload-hint { font-size: 11px; color: var(--text-light); }

        input[type="file"] { display: none; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 0 8px 0;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }

        .file-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .file-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            background: var(--surface);
            transition: background 0.2s;
        }

        .file-item:last-child { border-bottom: none; }
        .file-item:hover { background-color: var(--hover); }
        .file-item.selectable { cursor: pointer; }
        .file-item.selected {
            background-color: var(--hover);
            border-left: 1px solid var(--primary);
        }

        .file-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
        }

        .file-line {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .file-icon {
            font-size: 11px;
            color: var(--text-light);
        }
        .file-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .file-sub { font-size: 11px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .file-extra {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 12px;
            color: var(--text);
            opacity: 0.85;
        }
        .file-extra .file-meta-group {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .file-extra .file-recipient { font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-extra .file-total { margin-left: auto; white-space: nowrap; font-variant-numeric: tabular-nums; color: var(--text-light); }

        .file-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
        }
        .action-buttons {
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }

        .item-trash {
            padding: 4px 8px;
        }
        .item-trash i { font-size: 11px; }

        .file-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 10px;
            color: var(--text-light);
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            align-items: center;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .meta-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--text-light);
        }

        .meta-icon {
            width: 12px;
            height: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-light);
        }

        .meta-icon-success { color: var(--success); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background-color: var(--border); color: var(--text-light); cursor: not-allowed; }

        .btn-small { padding: 4px 8px; font-size: 11px; width: auto; margin: 0; background: none; color: var(--primary); }
        .btn-small:hover { background: var(--hover); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: var(--hover); }

        .download-btn {
            background: var(--hover);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .download-btn:hover { border-color: var(--primary); color: var(--primary); }
        .download-btn.downloaded { border-color: var(--success); color: var(--success); background: transparent; }

        .pdf-preview-trigger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            margin-left: 4px;
            color: currentColor;
            opacity: 0.7;
            cursor: zoom-in;
        }
        .pdf-preview-trigger:hover {
            opacity: 1;
            border-color: currentColor;
        }
        .pdf-preview-trigger i { font-size: 11px; }

        .inline-notice {
            margin-top: 10px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-light);
            font-size: 11px;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .inline-notice.visible { display: flex; }
        .inline-notice .notice-line {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .inline-notice .notice-line i {
            margin-top: 1px;
            color: var(--text-light);
        }

        .offers-shell {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .offers-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
        }

        .offers-generated-sticky {
            position: sticky;
            top: 0;
            z-index: 8;
            box-shadow: var(--shadow-sm);
        }

        .offers-generated-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .offer-parties-section {
            background: transparent;
            border: none;
            padding: 0;
            border-radius: 0;
        }
        .offer-parties-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: var(--space-5);
            align-items: start;
        }
        .offer-party {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            min-width: 0;
        }
        .offer-party-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: var(--space-3);
            min-width: 0;
        }
        .offer-party-label {
            font-size: 10px;
            font-weight: var(--fw-bold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }
        .offer-party .issuer-pill {
            min-width: 0;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .offer-buyer-card {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            padding: var(--space-4) var(--space-5);
        }
        .offer-buyer-card .offer-field { gap: var(--space-1); min-width: 0; }
        .offer-buyer-card label {
            font-size: 10px;
            font-weight: var(--fw-bold);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-light);
        }
        .offer-buyer-card .text-input {
            padding: 6px 8px;
            font-size: var(--fs-label);
        }

        .offer-meta-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr) minmax(0, 1fr);
            gap: var(--space-4);
        }

        .offer-details-text {
            margin-top: var(--space-4);
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: var(--space-4);
        }

        .offer-details-text .textarea-input {
            min-height: 48px;
            max-height: 104px;
        }

        .settings-link-btn {
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
            padding: 0;
        }

        .settings-link-btn:hover {
            color: var(--primary);
        }

        .offer-collapsible {
            padding: 0;
            overflow: hidden;
        }

        .offer-section-toggle {
            width: 100%;
            border: none;
            background: transparent;
            text-align: left;
            padding: 9px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .offer-section-toggle:hover {
            background: var(--hover);
        }

        .offer-section-toggle:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: -2px;
        }

        .offer-section-toggle .section-title {
            margin: 0;
            white-space: nowrap;
        }

        .offer-section-excerpt {
            flex: 1;
            min-width: 0;
            font-size: 11px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .offer-section-chevron {
            margin-left: auto;
            color: var(--text-light);
            font-size: 11px;
            transition: transform 0.18s ease;
        }

        .offer-collapsible:not(.is-collapsed) .offer-section-chevron {
            transform: rotate(180deg);
        }

        .offer-section-body {
            border-top: 1px solid var(--border);
            padding: 8px 10px 10px;
        }

        .offer-collapsible.is-collapsed .offer-section-body {
            display: none;
        }

        .offers-header {
            margin-bottom: 6px;
        }

        .offers-title {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
        }

        .offers-subtitle {
            margin: 2px 0 0;
            font-size: 11px;
            color: var(--text-light);
        }

        .offer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }

        .offer-grid-single {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-4);
        }

        .offer-grid > .offer-field.full {
            grid-column: 1 / -1;
        }

        .offer-field {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .offer-field label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
        }

        .offer-items-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .offer-items-table .col-desc { width: 26%; }
        .offer-items-table .col-qty { width: 11%; }
        .offer-items-table .col-unit { width: 10%; }
        .offer-items-table .col-price { width: 14%; }
        .offer-items-table .col-discount { width: 17%; }
        .offer-items-table .col-total { width: 14%; }
        .offer-items-table .col-actions { width: 8%; min-width: 36px; }

        .offer-items-table th,
        .offer-items-table td {
            border-bottom: 1px solid var(--border);
            padding: var(--space-3) var(--space-4);
            font-size: var(--fs-label);
            vertical-align: middle;
            background: var(--surface);
        }

        .offer-items-table thead th {
            background: var(--hover);
            color: var(--text-light);
            font-weight: var(--fw-bold);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-size: 10px;
        }

        .offer-items-table th.th-num,
        .offer-items-table td.td-num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .offer-items-table tbody tr:last-child td {
            border-bottom: none;
        }

        .offer-items-table .text-input,
        .offer-items-table .number-input {
            padding: 7px 8px;
            font-size: var(--fs-label);
        }

        .offer-items-table td.td-num .number-input {
            text-align: right;
        }

        .offer-items-table .number-input::-webkit-inner-spin-button,
        .offer-items-table .number-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .offer-items-table .number-input {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .offer-items-table .range-input {
            margin: 0;
        }

        .item-discount-stack {
            display: grid;
            gap: 3px;
        }

        .item-discount-value {
            font-size: 10px;
            color: var(--text-light);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .file-item.flash-new {
            animation: offerFlash 1.6s ease;
        }

        @keyframes offerFlash {
            0% {
                background: color-mix(in srgb, var(--primary) 20%, var(--surface));
                box-shadow: inset 2px 0 0 var(--primary);
            }
            100% {
                background: var(--surface);
                box-shadow: inset 0 0 0 transparent;
            }
        }

        .offer-actions-inline {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .offer-actions-inline .btn {
            width: auto;
            margin-top: 0;
        }

        .offer-footer-actions {
            display: flex;
            gap: var(--space-4);
            align-items: center;
            flex-wrap: wrap;
            margin-top: var(--space-5);
        }

        .offer-footer-actions-summary {
            margin-top: var(--space-6);
        }

        .offer-footer-actions .btn {
            margin-top: 0;
            width: auto;
        }

        .summary-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            margin-top: 6px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            font-size: 12px;
        }

        .summary-row strong {
            font-size: 13px;
        }

        .summary-row .summary-label {
            color: var(--text-light);
            font-weight: 600;
        }

        .offer-import-note {
            font-size: 10px;
            color: var(--text-light);
            margin-top: 2px;
        }

        .offer-settings-shell {
            display: grid;
            gap: 10px;
            padding: 10px;
            margin-bottom: 10px;
            background: color-mix(in srgb, var(--surface) 82%, var(--hover));
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .offer-settings-row {
            display: grid;
            gap: 7px;
        }

        .offer-issuer-toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto auto;
            gap: 6px;
            align-items: center;
        }

        .issuer-select-wrap {
            min-width: 0;
        }

        .issuer-select-wrap select {
            width: 100%;
            min-height: 34px;
        }

        .offer-issuer-toolbar .toggle-pill {
            width: auto;
            min-width: 0;
            padding: 5px 9px;
            font-size: 10px;
        }

        .offer-defaults-title {
            margin-top: 4px;
            margin-bottom: 2px;
        }

        .icon-pill-btn {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-light);
            border-radius: 999px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .icon-pill-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--hover);
        }

        .issuer-pill {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 11px;
            color: var(--text-light);
            display: grid;
            gap: 4px;
        }

        .issuer-pill-title {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-weight: 700;
            min-width: 0;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            padding: 2px 6px;
        }

        .source-badge.manual {
            border: 1px solid var(--primary);
            color: var(--primary);
            background: color-mix(in srgb, var(--primary) 12%, transparent);
        }

        .source-badge.xml {
            border: 1px solid var(--border);
            color: var(--text-light);
            background: var(--hover);
        }

        .issuer-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .issuer-chip {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 999px;
            padding: 3px 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            max-width: 100%;
        }

        .issuer-chip.current {
            border-color: var(--primary);
        }

        .issuer-chip-main {
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 10px;
            font-weight: 600;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .issuer-chip-remove {
            border: none;
            background: transparent;
            color: var(--text-light);
            width: 18px;
            height: 18px;
            border-radius: 999px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .issuer-chip-remove:hover {
            color: #ffffff;
            background: var(--primary);
        }

        .issuer-editor {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 10px;
            padding: 10px;
            display: grid;
            gap: 10px;
        }

        .issuer-editor.is-hidden {
            display: none;
        }

        .issuer-editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .issuer-editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .issuer-mode-switch {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .issuer-mode-switch .toggle-pill {
            width: auto;
            padding-left: 10px;
            padding-right: 10px;
        }

        .issuer-mode-switch .toggle-pill.active {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        .issuer-create-import {
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 10px;
            display: grid;
            gap: 6px;
            background: color-mix(in srgb, var(--surface) 88%, var(--hover));
        }

        .issuer-create-import.is-hidden,
        .issuer-editor-grid.is-hidden,
        .issuer-editor-actions.is-hidden {
            display: none;
        }

        .issuer-editor-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .issuer-editor-actions .btn {
            width: auto;
            margin-top: 0;
        }

        .issuer-editor-grid .offer-field.full {
            grid-column: 1 / -1;
        }

        .offer-defaults-grid {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .offer-defaults-grid .offer-field.full {
            grid-column: 1 / -1;
        }

        .range-stack {
            display: grid;
            gap: 4px;
        }

        .range-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 10px;
            color: var(--text-light);
        }

        .range-value {
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            min-width: 44px;
            text-align: right;
        }

        .is-hidden {
            display: none !important;
        }

        /* ----- Shared component states ----- */

        .btn-small-muted {
            color: var(--text-light);
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-light);
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 11px;
            transition: background var(--dur-fast) var(--ease-out),
                        border-color var(--dur-fast) var(--ease-out),
                        color var(--dur-fast) var(--ease-out);
            padding: 0;
        }
        .btn-icon:hover { background: var(--hover); }
        .btn-icon:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
        .btn-icon.btn-icon-danger:hover,
        .btn-icon.btn-icon-danger:focus-visible {
            background: var(--danger);
            border-color: var(--danger);
            color: var(--danger-fg);
        }

        .is-busy {
            opacity: 0.75;
            cursor: progress !important;
            pointer-events: none;
        }

        .is-confirming {
            background: var(--danger) !important;
            border-color: var(--danger) !important;
            color: var(--danger-fg) !important;
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 25%, transparent);
            transition: background var(--dur-fast) var(--ease-out),
                        box-shadow var(--dur-fast) var(--ease-out),
                        border-color var(--dur-fast) var(--ease-out),
                        color var(--dur-fast) var(--ease-out);
        }
        .is-confirming i { color: var(--danger-fg); }

        .field-error {
            display: none;
            color: var(--danger);
            font-size: var(--fs-label);
            line-height: 1.35;
            margin-top: var(--space-2);
        }
        .offer-field.has-error .field-error { display: block; }
        .offer-field.has-error .text-input,
        .offer-field.has-error .number-input,
        .offer-field.has-error .date-input,
        .offer-field.has-error .textarea-input,
        .offer-field.has-error select { border-color: var(--danger); }
        .offer-field.has-error label { color: var(--danger); }

        .autocomplete-panel [role="option"].is-active,
        .autocomplete-panel .buyer-suggestion.is-active { background: var(--hover); }

        body.has-modal { overflow: hidden; }

        .compact-card {
            padding: 10px;
        }

        .autocomplete-wrap {
            position: relative;
        }

        .autocomplete-panel {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 4px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            box-shadow: var(--shadow-md);
            z-index: 40;
            max-height: 180px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-panel.open {
            display: block;
        }

        .buyer-suggestion {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
        }

        .buyer-suggestion:last-child {
            border-bottom: none;
        }

        .buyer-suggestion-main {
            border: none;
            background: transparent;
            text-align: left;
            font-size: 11px;
            color: var(--text);
            cursor: pointer;
            min-width: 0;
            padding: 0;
        }

        .buyer-suggestion-main .sub {
            display: block;
            font-size: 10px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .buyer-suggestion-remove {
            border: none;
            background: transparent;
            color: var(--text-light);
            width: 18px;
            height: 18px;
            border-radius: 999px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .buyer-suggestion-remove:hover {
            background: var(--primary);
            color: #ffffff;
        }

        .import-list {
            margin: 8px 0 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 6px;
        }

        .import-row {
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        .import-key {
            color: var(--text-light);
            font-weight: 600;
        }

        .import-value {
            text-align: right;
            word-break: break-word;
        }

        .import-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .import-actions .btn {
            width: auto;
            margin-top: 0;
        }

        .footer {
            margin-top: 14px;
            text-align: center;
            font-size: 11px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            padding-top: 10px;
            transition: opacity 0.22s ease, max-height 0.24s ease, margin 0.22s ease, padding 0.22s ease;
            max-height: 80px;
            overflow: hidden;
        }

        .footer a { color: var(--text-light); text-decoration: none; font-weight: 500; }
        .footer a:hover { color: var(--primary); }

        body.settings-open .footer {
            opacity: 0;
            max-height: 0;
            margin-top: 0;
            padding-top: 0;
            border-top-width: 0;
            pointer-events: none;
        }

        .error-toast {
            position: fixed;
            bottom: var(--space-7);
            left: var(--space-7);
            right: var(--space-7);
            padding: var(--space-5) var(--space-7);
            background: var(--danger);
            color: var(--danger-fg);
            border-radius: var(--radius-md);
            font-size: var(--fs-body);
            display: none;
            box-shadow: var(--shadow-lg);
            z-index: 100;
        }
        .error-toast.is-info { background: var(--primary); color: #fff; }
        .error-toast.is-success { background: var(--success); color: #fff; }
        .error-toast.is-warn { background: var(--warn); color: #1f2a37; }

        .preview-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: var(--scrim);
            backdrop-filter: blur(6px);
            z-index: 200;
        }
        .preview-overlay.open { display: flex; animation: previewFade 0.18s ease; }

        .preview-card {
            width: min(92vw, 880px);
            max-height: 90vh;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-overlay);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: previewLift 0.2s ease;
        }
        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface) 85%, transparent);
        }

        .preview-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .preview-close {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 999px;
            cursor: pointer;
        }
        .preview-close:hover { border-color: var(--primary); color: var(--primary); }

        .preview-body {
            padding: 12px;
            background: transparent;
        }

        .preview-iframe {
            width: 100%;
            height: 68vh;
            border: none;
            border-radius: 10px;
            background: var(--bg);
        }

        @media (max-width: 620px) {
            body {
                min-width: 360px;
            }

            .offer-grid {
                grid-template-columns: 1fr;
            }

            .offer-details-text {
                grid-template-columns: 1fr;
            }

            .issuer-editor-grid,
            .offer-defaults-grid {
                grid-template-columns: 1fr;
            }

            .offer-parties-grid {
                grid-template-columns: 1fr;
            }

            .offer-meta-grid {
                grid-template-columns: 1fr 1fr;
            }

            .offer-issuer-toolbar {
                grid-template-columns: 1fr auto auto auto;
            }

            .offer-footer-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .offer-footer-actions .btn {
                width: 100%;
            }
        }

        @keyframes previewFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes previewLift {
            from { transform: translateY(8px) scale(0.98); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
    </style>
</head>
<body>
    <div class="top-bar">
        <button id="settings-toggle" class="settings-btn" data-i18n="settingsButton" aria-expanded="false"></button>

    <header>
        <div class="brand">

                <h2 data-i18n="appTitle"></h2>
                <div class="subtitle" data-i18n="appSubtitle"></div>
            </div>

    <div class="privacy-note" data-i18n-html="privacyNoteHtml"></div>

    <section id="settings-panel" class="settings-panel" aria-hidden="true">
        <div class="setting-group-title" data-i18n="groupApp"></div>
        <div class="setting-item" id="display-mode-row">
            <div class="setting-label" data-i18n="settingDisplayMode"></div>
            <button type="button" class="toggle-pill" id="display-mode-toggle"></button>
        </div>
        <div class="setting-item">
            <div class="setting-label" data-i18n="settingTheme"></div>
            <button type="button" class="toggle-pill" id="theme-mode-toggle"></button>
        </div>
        <div class="setting-item">
            <div class="setting-label" data-i18n="settingLanguage"></div>
            <button type="button" class="toggle-pill" id="ui-language-toggle"></button>
        </div>

        <div class="setting-group-head">
            <div class="setting-group-title" data-i18n="groupPdf"></div>
            <div class="setting-group-note" data-i18n="settingPdfScopeNote"></div>
        </div>
        <div class="setting-item">
            <div class="setting-label" data-i18n="settingPdfLanguage"></div>
            <button type="button" class="toggle-pill" id="pdf-language-toggle"></button>
        </div>
        <div class="setting-item">
            <div class="setting-label" data-i18n="settingPdfColor"></div>
            <input type="color" id="pdf-color-input" class="color-input" value="#2c3e50">
        </div>
        <div class="setting-item setting-stack">
            <div class="setting-head">
                <div class="setting-label" data-i18n="settingPdfLogo"></div>

                    <button type="button" class="toggle-pill" id="pdf-logo-button"></button>

        </div>

        <div class="setting-group-title" data-i18n="groupOffers"></div>
        <div class="offer-settings-shell">
            <div class="offer-settings-row">
                <div class="setting-label" data-i18n="offerSettingsEntitiesTitle"></div>
                <div class="offer-issuer-toolbar">
                    <div class="issuer-select-wrap">
                        <select id="offer-issuer-select" class="text-input"></select>

                    <button id="offer-issuer-edit-btn" type="button" class="toggle-pill" data-i18n="offerIssuerEdit"></button>
                    <button id="offer-issuer-remove-btn" type="button" class="icon-pill-btn" data-i18n-attr="title:offerIssuerClearSelection,aria-label:offerIssuerClearSelection">
                        <i class="fas fa-times" aria-hidden="true"></i>
                    </button>
                </div>
                <div id="offer-selected-issuer-pill" class="issuer-pill" data-i18n="offerIssuerNoneSelected"></div>
                <div id="offer-issuer-chip-list" class="issuer-chip-list"></div>
            </div>

            <div id="offer-issuer-editor" class="issuer-editor is-hidden">
                <div class="issuer-editor-header">
                    <div id="offer-issuer-editor-title" class="setting-label" data-i18n="offerIssuerEditorTitleNew"></div>
                    <div id="offer-issuer-mode-switch" class="issuer-mode-switch">
                        <button id="offer-issuer-mode-import-btn" type="button" class="toggle-pill" data-i18n="offerIssuerModeImport"></button>
                        <button id="offer-issuer-mode-manual-btn" type="button" class="toggle-pill" data-i18n="offerIssuerModeManual"></button>

                </div>
                <div id="offer-issuer-create-import" class="issuer-create-import">
                    <div class="offer-actions-inline">
                        <button id="offer-import-issuer-btn" class="btn btn-outline" type="button">
                            <i class="fas fa-file-import" aria-hidden="true"></i>
                            <span data-i18n="offerImportIssuer"></span>
                        </button>
                        <input type="file" id="offer-import-xml-input" accept=".xml,application/xml,text/xml">

                    <div class="offer-import-note" data-i18n="offerImportHint"></div>

            <div class="setting-label offer-defaults-title" data-i18n="offerSettingsDefaultsTitle"></div>

                    <input type="text" id="offer-setting-number-prefix" class="text-input">

                <div class="offers-generated-head">
                    <div class="section-title" data-i18n="offerGeneratedTitle"></div>
                    <button id="offer-clear-generated-btn" class="btn-small" type="button" data-i18n="offerClearGenerated"></button>
                </div>
                <div id="offer-results-list" class="file-list"></div>
            </section>

            <section class="offers-section">
                <div class="offers-header">
                    <h3 class="offers-title" data-i18n="offersTitle"></h3>
                    <p class="offers-subtitle" data-i18n="offersSubtitle"></p>
                </div>
            </section>

            <section class="offers-section offer-parties-section">
                <div class="offer-parties-grid">
                    <div class="offer-party">
                        <div class="offer-party-head">
                            <span class="offer-party-label" data-i18n="offerIssuerSection"></span>

                                    <input id="offer-customer-name" class="text-input" type="text" autocomplete="off">
                                    <div id="buyer-name-suggestions" class="autocomplete-panel"></div>
                                </div>
                            </div>
                            <div class="offer-field">
                                <label for="offer-customer-oib" data-i18n="offerCustomerOibLabel"></label>
                                <div class="autocomplete-wrap">
                                    <input id="offer-customer-oib" class="text-input" type="text" autocomplete="off">
                                    <div id="buyer-oib-suggestions" class="autocomplete-panel"></div>
                                </div>
                            </div>
                            <div class="offer-field">
                                <label for="offer-customer-address" data-i18n="offerCustomerAddressLabel"></label>
                                <input id="offer-customer-address" class="text-input" type="text">

                </div>

                    <span class="section-title" data-i18n="offerDetailsSection"></span>
                    <span id="offer-details-excerpt" class="offer-section-excerpt"></span>
                    <i class="fas fa-chevron-down offer-section-chevron" aria-hidden="true"></i>
                </button>
                <div class="offer-section-body" data-offer-section-body="details">
                    <div class="offer-meta-grid">
                        <div class="offer-field">

                            <input id="offer-number" class="text-input" type="text" autocomplete="off">

                        </div>
                        <div class="offer-field">

                            <textarea id="offer-note" class="textarea-input"></textarea>

                                <th data-i18n="offerItemDescription"></th>
                                <th class="th-num" data-i18n="offerItemQty"></th>

                                <th class="th-num" data-i18n="offerItemUnitPrice"></th>
                                <th class="th-num" data-i18n="offerItemDiscount"></th>
                                <th class="th-num" data-i18n="offerItemTotal"></th>
